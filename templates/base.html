<!DOCTYPE html>
<html lang="en" class="theme-dark"
      x-data="{ theme: localStorage.getItem('mangopi-theme') || 'light' }"
      x-init="$watch('theme', val => {
        document.documentElement.className = 'theme-' + val;
        localStorage.setItem('mangopi-theme', val);
      })"
      :class="'theme-' + theme">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}mangopi-web{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- htmx 2.x (47KB unminified) · SSE is built-in via hx-sse -->
  <script src="/static/htmx.min.js"></script>
  <!-- Alpine.js 15KB · local UI state (modals, etc.) -->
  <script defer src="/static/alpine.min.js"></script>

  <style>
  /* =========================================================================
     Mangopi Web · v0.1 — design system (v3 lineage)
     Primary: emerald #10b981 · Type: Outfit + JetBrains Mono · Dark theme
     ========================================================================= */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    margin: 0;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .theme-dark {
    --bg: #0f0f12;
    --bg-elevated: #18181d;
    --bg-card: #1c1c22;
    --bg-card-hover: #22222a;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --text: #e5e5e5;
    --text-muted: #888;
    --text-dim: #555;
    --primary: #10b981;
    --primary-dim: rgba(16, 185, 129, 0.12);
    --primary-glow: rgba(16, 185, 129, 0.25);
    --orange: #ff8c42;
    --orange-dim: rgba(255, 140, 66, 0.12);
    --cyan: #22d3ee;
    --cyan-dim: rgba(34, 211, 238, 0.12);
    --red: #f43f5e;
    --red-dim: rgba(244, 63, 94, 0.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59, 130, 246, 0.12);
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --purple-dim: rgba(167, 139, 250, 0.12);
  }

  .theme-light {
    --bg: #ecece9;
    --bg-elevated: #f8f8f6;
    --bg-card: #ffffff;
    --bg-card-hover: #f2f2ee;
    --border: rgba(0, 0, 0, 0.06);
    --border-strong: rgba(0, 0, 0, 0.11);
    --text: #1c1917;
    --text-muted: #78716c;
    --text-dim: #a8a29e;
    --primary: #059669;
    --primary-dim: rgba(5, 150, 105, 0.08);
    --primary-glow: rgba(5, 150, 105, 0.18);
    --orange: #d97706;
    --orange-dim: rgba(217, 119, 6, 0.08);
    --cyan: #0891b2;
    --cyan-dim: rgba(8, 145, 178, 0.08);
    --red: #dc2626;
    --red-dim: rgba(220, 38, 38, 0.08);
    --blue: #2563eb;
    --blue-dim: rgba(37, 99, 235, 0.08);
    --yellow: #ca8a04;
    --purple: #7c3aed;
    --purple-dim: rgba(124, 58, 237, 0.08);
  }

  /* ===== Top Status Bar ===== */
  .topbar {
    height: 48px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    font-size: 13px;
  }
  .logo {
    font-weight: 600;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .logo svg { width: 16px; height: 16px; }
  .topbar-section { display: flex; align-items: center; gap: 6px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .badge-primary { background: var(--primary-dim); color: var(--primary); }
  .badge-orange { background: var(--orange-dim); color: var(--orange); }
  .badge-mock { background: var(--orange-dim); color: var(--orange); }

  .token-meter {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .token-bar {
    width: 120px; height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden;
  }
  .token-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #4ade80);
    border-radius: 3px;
    transition: width 0.4s;
  }
  .divider { width: 1px; height: 20px; background: var(--border); }

  /* ===== Layout: 3 cols (full v3 fidelity) ===== */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    grid-template-rows: 1fr auto;
    height: calc(100vh - 48px);
    overflow: hidden;
  }
  .app-footer {
    grid-column: 1 / -1;
    text-align: center;
    padding: 6px 0;
    font-size: 10px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
  }

  /* ===== Left Sidebar: Tasks ===== */
  .sidebar-left {
    background: var(--bg-elevated);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-title {
    font-weight: 600; font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .create-task-btn {
    margin: 12px 16px 0;
    padding: 7px 12px;
    background: var(--primary-dim);
    color: var(--primary);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    transition: background 0.15s;
  }
  .create-task-btn:hover {
    background: rgba(16, 185, 129, 0.20);
  }

  .sidebar-search {
    padding: 6px 10px 8px;
  }
  .sidebar-dashboard {
    padding: 6px 10px 0;
    display: flex;
    gap: 4px;
  }
  .sd-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 4px 5px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
  }
  .sd-card-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }
  .sd-card-label {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }
  .sd-card:first-child { border-color: var(--cyan); }
  .sd-card:first-child .sd-card-value { color: var(--cyan); }
  .sd-card.accent-active { border-color: var(--primary); }
  .sd-card.accent-active .sd-card-value { color: var(--primary); }
  .sd-card.accent-health { border-color: var(--orange); }
  .sd-card.accent-health .sd-card-value { color: var(--orange); }
  .search-input {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    box-sizing: border-box;
  }
  .search-input:focus {
    border-color: var(--primary);
  }
  .search-input::placeholder {
    color: var(--text-dim);
  }
  .task-list { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }

  .task-item {
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 4px;
    cursor: pointer;
    background: var(--bg-card);
    transition: background 0.15s;
    position: relative;                   /* anchor for delete button */
  }
  .task-item:hover { background: var(--bg-card-hover); }
  .task-item.active { background: var(--primary-dim); }

  /* ── Action menu (⋮ / ⋯ button + dropdown) ────────────────────────── */
  .task-menu {
    position: absolute;
    right: 6px;
    bottom: 6px;
    z-index: 40;
  }
  .task-menu-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    padding: 0;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 22px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .task-menu-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.06);
  }
  .task-menu-dropdown {
    position: absolute;
    right: 0;
    top: 100%;
    margin-top: 4px;
    min-width: 130px;
    padding: 4px;
    border-radius: 6px;
    background: var(--bg-card-hover);
    border: 1px solid var(--border);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    z-index: 50;
  }
  .task-menu-item {
    display: block;
    width: 100%;
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--red);
    font-size: 12px;
    text-align: left;
    cursor: pointer;
    white-space: nowrap;
  }
  .task-menu-item:hover {
    background: var(--red-dim);
  }
  /* ── end action menu ───────────────────────────────────────────────── */

  .task-item-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .task-item-name {
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  .task-item-id-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 4px;
  }
  .git-branch-icon {
    color: var(--cyan);
    flex-shrink: 0;
  }
  .task-item-branch-id {
    font-size: 10px;
    color: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
  }
  .task-item-progress {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 4px;
  }
  .task-progress-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border-strong);
    flex-shrink: 0;
  }
  .task-progress-dot.done {
    background: var(--primary);
    border-color: var(--primary);
  }
  .task-progress-dot.running {
    background: var(--orange);
    border-color: var(--orange);
    animation: pulse 1.5s infinite;
  }
  .task-progress-dot.failed {
    background: var(--red);
    border-color: var(--red);
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  /* flex:1 lets connectors absorb the slack so the timeline spans the
     full card width — dots are fixed-size, connectors grow to fill. */
  .task-progress-connector {
    flex: 1;
    height: 1.5px;
    min-width: 8px;
    background: var(--border-strong);
  }
  .task-progress-connector.done { background: var(--primary); }
  .task-progress-connector.running { background: var(--orange); }
  .task-progress-connector.failed { background: var(--red); }

  .task-item-summary-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }
  .task-item-ago {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .task-summary-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 500;
    background: rgba(255,255,255,0.06);
    color: var(--text-muted);
  }
  .task-summary-badge.done   { background: var(--primary-dim); color: var(--primary); }
  .task-summary-badge.running{ background: var(--orange-dim);  color: var(--orange); }
  .task-summary-badge.failed { background: var(--red-dim);     color: var(--red); }
  .task-summary-badge.queued { background: rgba(255,255,255,0.06); color: var(--text-muted); }

  .task-status-pill {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 500;
  }
  .task-status-pill.queued  { background: rgba(255,255,255,0.06); color: var(--text-muted); }
  .task-status-pill.running { background: var(--orange-dim); color: var(--orange); }
  .task-status-pill.done    { background: var(--primary-dim); color: var(--primary); }
  .task-status-pill.failed  { background: var(--red-dim); color: var(--red); }

  /* ===== Main ===== */
  .main { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  .task-header {
    padding: 16px 24px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
  }
  .task-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .task-header-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .task-header-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .task-header-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: rgba(255,255,255,0.06);
    border: none;
    color: var(--text);
    width: 28px; height: 28px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { background: rgba(128,128,128,0.12); }
  .icon-btn.danger { color: var(--red); }

  /* ===== Phase Timeline (the hero) ===== */
  .phase-timeline {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .phase-step {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    position: relative;
  }
  .phase-circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 2px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .phase-step.done .phase-circle {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }
  .phase-step.running .phase-circle {
    background: var(--orange);
    border-color: var(--orange);
    color: #2a1a08;
    animation: pulse 1.5s infinite;
  }
  .phase-step.failed .phase-circle {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .phase-info { flex: 1; min-width: 0; }
  .phase-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .phase-step.done .phase-name,
  .phase-step.running .phase-name { color: var(--text); }
  .phase-step.failed .phase-name { color: var(--text); }
  .phase-status {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .phase-step.done .phase-status { color: var(--primary); }
  .phase-step.running .phase-status { color: var(--orange); }
  .phase-step.failed .phase-status { color: var(--red); }

  .phase-connector {
    height: 2px;
    background: var(--border-strong);
    flex: 0.5;
    margin: 0 4px;
    align-self: center;
    margin-top: -10px;
  }
  .phase-connector.done { background: var(--primary); }
  .phase-connector.running {
    background: linear-gradient(90deg, var(--primary) 0%, var(--orange) 100%);
  }
  .phase-connector.failed { background: var(--red); }

  /* ===== Phase content (event log area) ===== */
  .phase-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .phase-header-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
    margin-left: auto;
    margin-right: auto;
  }
  .phase-header-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .phase-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .phase-tag.running { background: var(--orange-dim); color: var(--orange); }
  .phase-tag.done    { background: var(--primary-dim); color: var(--primary); }
  .phase-tag.failed  { background: var(--red-dim); color: var(--red); }
  .phase-tag.pending { background: rgba(255,255,255,0.06); color: var(--text-muted); }

  .phase-goal {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }
  .phase-goal-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  /* Agent Run block */
  .agent-run {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 0 auto 16px;
    overflow: hidden;
  }
  .agent-run-header {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }
  .agent-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--orange-dim);
    color: var(--orange);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
  }
  .agent-avatar.implementer { background: var(--primary-dim); color: var(--primary); }
  .agent-avatar.verifier { background: var(--blue-dim); color: var(--blue); }
  .agent-avatar.updater  { background: var(--purple-dim); color: var(--purple); }
  .agent-name { font-size: 12px; font-weight: 500; }
  .agent-name.implementer { color: var(--primary); }
  .agent-name.verifier   { color: var(--blue); }
  .agent-run-meta { color: var(--text-muted); font-size: 11px; margin-left: auto; }
  .agent-run-body { padding: 12px 14px; }

  /* ── Phase divider ─────────────────────────────────────────────────── */
  .phase-divider {
    margin: 24px 0 16px;
    position: relative;
    text-align: center;
  }
  .phase-divider-line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border-strong);
  }
  .phase-divider-label {
    position: relative;
    display: inline-block;
    padding: 0 12px;
    background: var(--bg);
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .output-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  /* Thinking block (agent reasoning) */
  .thinking-block {
    margin-bottom: 14px;
    padding: 8px 12px;
    background: rgba(255, 140, 66, 0.04);
    border-left: 2px solid var(--orange);
    border-radius: 0 6px 6px 0;
  }
  .thinking-label {
    font-size: 10px;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .thinking-text {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    white-space: pre-wrap;
    margin-top: 4px;
  }

  /* ── Output block (tool/agent stdout) ────────────────────────────────── */
  .output-block {
    margin-bottom: 14px;
    padding: 8px 12px;
    background: rgba(16, 185, 129, 0.03);
    border-left: 2px solid var(--primary);
    border-radius: 0 6px 6px 0;
  }
  .output-content {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 160px;
    overflow-y: auto;
  }

  .tool-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 8px 0;
    overflow: hidden;
  }
  .tool-header {
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }
  .tool-name {
    font-family: 'JetBrains Mono', monospace;
    color: var(--orange); font-size: 11px; font-weight: 500;
  }
  .tool-args {
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tool-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    margin-left: auto;
  }
  .tool-status.success { color: var(--primary); }
  .tool-status.fail    { color: var(--red); }
  .tool-status.call    { color: var(--orange); font-weight: 500; }
  .tool-status.pending { color: var(--text-muted); }
  .tool-content {
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
    max-height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
  }

  /* Tool call/result pairing */
  .tool-card.call { border-left: 2px solid var(--border-strong); }
  .tool-card.result { border-left: 2px solid var(--primary); }
  .tool-card.call + .tool-card.result { margin-top: -6px; border-top: none; border-radius: 0 0 6px 6px; }
  .tool-card.result .tool-header { background: rgba(16,185,129,0.03); }

  /* ── Stage header ──────────────────────────────────────────────────── */
  .stage-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 12px;
    padding: 0;
  }
  .stage-header-line {
    width: 2px;
    height: 18px;
    background: var(--border-strong);
    border-radius: 1px;
    flex-shrink: 0;
  }
  .stage-header-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .stage-header-detail {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── Verdict slim (pass/fail) ──────────────────────────────────────── */
  .verdict-slim {
    padding: 6px 12px;
    margin: 8px 0;
    font-size: 12px;
    border-radius: 4px;
  }
  .verdict-slim.pass { background: var(--primary-dim); color: var(--primary); }
  .verdict-slim.fail { background: var(--red-dim);     color: var(--red); }

  /* ── Exit code ─────────────────────────────────────────────────────── */
  .exit-code {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin: 8px 0;
    letter-spacing: 0.05em;
  }
  
  /* Diff lines (placeholder for tool output in v0.1; live in v0.1.1) */
  .diff-line { display: flex; gap: 8px; padding: 1px 10px; font-size: 11px; }
  .diff-line-num {
    width: 22px; text-align: right;
    color: rgba(255,255,255,0.3);
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .diff-line-content { flex: 1; white-space: pre; font-family: 'JetBrains Mono', monospace; }
  .diff-line.add { background: rgba(16, 185, 129, 0.08); }
  .diff-line.add .diff-line-content { color: #6ee7b7; }
  .diff-line.del { background: rgba(244, 63, 94, 0.08); }
  .diff-line.del .diff-line-content { color: #fca5a5; }
  .diff-line.empty { color: var(--text-dim); padding: 6px 10px; font-style: italic; }

  .streaming {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--orange); font-size: 12px;
  }
  .streaming-dot {
    width: 5px; height: 5px; background: var(--orange);
    border-radius: 50%; animation: pulse 1s infinite;
  }

  .verdict-block {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--primary);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 8px auto 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
  }
  .verdict-block.fail { border-left-color: var(--red); }

  /* ===== Right Sidebar: Working Dir + Git ===== */
  .sidebar-right {
    background: var(--bg-elevated);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .right-section {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    background: var(--bg-card);
    margin: 0 0 6px;
    border-radius: 6px;
  }
  .right-section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .right-section-title {
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 6px;
  }
  .wd-path {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text);
    background: rgba(255,255,255,0.04);
    padding: 6px 10px; border-radius: 5px;
    margin-bottom: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .wd-branch {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--primary);
    background: var(--primary-dim);
    padding: 3px 8px; border-radius: 4px;
  }
  .wd-files-header {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--text-muted);
    margin: 12px 0 6px;
  }
  .wd-file {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 0;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .wd-file-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; width: 12px;
    text-align: center; flex-shrink: 0;
  }
  .wd-file-status.modified { color: var(--orange); }
  .wd-file-status.added    { color: var(--primary); }
  .wd-file-status { font-weight: 500; }
  .wd-file-status.M { color: var(--orange); }
  .wd-file-status.A { color: var(--primary); }
  .wd-file-status.D { color: var(--red); }
  .wd-file-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wd-file-stats { color: var(--text-muted); font-size: 10px; }
  .wd-file-stats .add { color: var(--primary); }
  .wd-file-stats .del { color: var(--red); }
  .wd-summary {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px dashed var(--border);
    font-size: 11px; color: var(--text-muted);
    display: flex; justify-content: space-between;
  }
  .wd-summary strong { color: var(--text); font-weight: 500; }

  .commit-item {
    padding: 8px; margin: 0 -8px 4px;
    border-radius: 5px;
    cursor: pointer; transition: background 0.1s;
  }
  .commit-item:hover { background: rgba(255,255,255,0.02); }
  .commit-item.active { background: var(--primary-dim); }
  .commit-head {
    display: flex; align-items: center; gap: 6px; margin-bottom: 3px;
  }
  .commit-hash {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--orange);
    background: var(--orange-dim);
    padding: 1px 5px; border-radius: 3px; font-weight: 500;
  }
  .commit-time { font-size: 10px; color: var(--text-muted); margin-left: auto; }
  .commit-msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .commit-files {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--text-muted);
  }
  .commit-item.empty { opacity: 0.4; cursor: default; }
  .commit-item.empty:hover { background: transparent; }
  .wd-file.empty { opacity: 0.4; }

  /* Input area (chat box at bottom) */
  /* ===== Empty state ===== */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text-muted);
  }
  .empty-state-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    color: var(--text-dim);
  }
  .empty-state-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-state-text { font-size: 13px; line-height: 1.6; max-width: 320px; text-align: center; }

  /* ===== Modal: Create Task ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    width: 100%;
    max-width: 560px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title {
    font-size: 16px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .modal-close {
    background: transparent; border: none;
    color: var(--text-muted);
    width: 28px; height: 28px;
    border-radius: 5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: rgba(255,255,255,0.06); color: var(--text); }

  .modal-body { padding: 18px 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }
  .form-label .hint {
    color: var(--text-muted); font-weight: 400; margin-left: 4px;
  }
  .form-input,
  .form-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 9px 12px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--primary); }
  .form-textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
  .form-input.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  .form-checkbox {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0;
    cursor: pointer;
  }
  .form-checkbox input[type="checkbox"] {
    appearance: none;
    width: 16px; height: 16px;
    border: 1.5px solid var(--border-strong);
    border-radius: 3px;
    background: var(--bg);
    cursor: pointer;
    position: relative;
  }
  .form-checkbox input[type="checkbox"]:checked {
    background: var(--primary);
    border-color: var(--primary);
  }
  .form-checkbox input[type="checkbox"]:checked::after {
    content: ""; position: absolute;
    left: 4px; top: 1px;
    width: 4px; height: 8px;
    border: solid var(--primary);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .form-checkbox label { font-size: 13px; color: var(--text); cursor: pointer; }

  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.04); }
  .btn-primary {
    background: var(--primary);
    color: white;
    border: none;
    font-weight: 600;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--primary-glow); }

  /* ===== Misc ===== */
  [x-cloak] { display: none !important; }
  .scrollbar::-webkit-scrollbar { width: 6px; }
  .scrollbar::-webkit-scrollbar-track { background: transparent; }
  .scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1);
                                         border-radius: 3px; }
  .scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
         background: rgba(255,255,255,0.06); padding: 1px 5px;
         border-radius: 3px; color: var(--text-muted); }
  </style>
</head>
<body>
  <!-- ===== Top Status Bar ===== -->
  <div class="topbar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      mangopi-web
    </div>
    <div class="topbar-section" style="margin-left: auto;">
      <div class="token-meter" id="token-meter" style="display: none;">
        <span id="token-usage">0</span>
        <div class="token-bar"><div class="token-fill" id="token-fill" style="width: 0%"></div></div>
        <span id="token-pct">0%</span>
      </div>
      <div class="divider"></div>
      <button class="icon-btn" @click="theme = theme === 'light' ? 'dark' : 'light'"
              style="width: 28px; height: 28px; padding: 0;"
              title="Toggle theme"
              x-text="theme === 'light' ? '🌙' : '☀️'"></button>
      <button id="settings-btn" class="icon-btn" title="settings (v0.2)"
              style="width: 28px; height: 28px; padding: 0;">⚙</button>
      <a href="/health" style="font-size: 12px; color: var(--text-muted);">/health</a>
    </div>
  </div>

  {% block content %}{% endblock %}

  <script>
  // Settings button: vanilla-JS fallback (no Alpine needed)
  (function() {
    var btn = document.getElementById('settings-btn');
    if (btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        alert('Settings coming in v0.2.\n\nFor v0.1, use env vars:\n' +
              '  MANGOPI_WEB_PORT=8080\n' +
              '  MANGOPI_WEB_MODE=mock|real\n' +
              '  MANGOPI_WEB_MAX_CONCURRENT=3');
      });
    }
  })();
  </script>
</body>
</html>
