{# OOB-only partial for live row updates.
   Replaces the dot and ago time. #}

{# Row dot #}
<span id="task-{{ task.id }}-dot" hx-swap-oob="outerHTML"
      class="task-row-dot {{ task.status }}"></span>

{# Relative time #}
<span id="task-{{ task.id }}-ago" hx-swap-oob="outerHTML"
      class="task-row-time">{{ task.last_event_at|ago if task.last_event_at else "" }}</span>

{# SSE cleanup #}
{% if task.status in ('done', 'failed') %}
<div id="task-{{ task.id }}-sse" hx-swap-oob="delete" style="display:none"></div>
{% endif %}
